<div class="event-card">
  <div class="d-flex justify-content-between align-items-start mb-2">
    <div class="d-flex align-items-center gap-2 flex-wrap">
      <span class="event-title">{{ event.title }}</span>
      <span class="badge rounded-pill" [class]="statusBadgeClass">{{ statusLabel }}</span>
      <span class="badge rounded-pill bg-light text-secondary border">{{ eventTypeLabel }}</span>
    </div>
  </div>

  <div class="d-flex flex-wrap gap-3 mb-2 event-details">
    <span class="detail-chip">
      <i class="bi bi-calendar3"></i> {{ formattedDate }}
    </span>
    <span class="detail-chip">
      <i class="bi bi-clock"></i> {{ formattedTimeRange }}
    </span>
    <span class="detail-chip">
      <i class="bi bi-people"></i> {{ event.headcount }} guests
    </span>
    <span class="badge rounded-pill" [class]="event.locationType === 'on_site' ? 'border text-secondary' : 'border text-info'">
      {{ locationLabel }}
    </span>
    <span class="detail-chip">
      <i class="bi bi-person"></i> {{ event.contactName }}
    </span>
  </div>

  <div class="d-flex gap-2 mt-2">
    @if (canAdvance) {
      <button type="button" class="btn btn-sm btn-outline-primary" (click)="advanceStatus()">
        {{ advanceLabel }}
      </button>
    }
    <button type="button" class="btn btn-sm btn-outline-secondary" (click)="edit()">
      Edit
    </button>
    @if (canCancel) {
      <button type="button" class="btn btn-sm btn-outline-danger" (click)="cancel()">
        Cancel
      </button>
    }
  </div>
</div>
