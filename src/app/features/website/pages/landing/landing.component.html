<!-- Hero -->
<os-mkt-section background="hero">
  <os-mkt-hero
    [tag]="hero.tag"
    [title]="hero.title"
    [subtitle]="hero.subtitle"
    [primaryCta]="hero.primaryCta"
    [secondaryCta]="hero.secondaryCta"
    alignment="center" />
</os-mkt-section>

<!-- Social proof bar -->
<os-social-proof-bar />

<!-- Pain points -->
<os-mkt-section>
  <os-pain-points />
</os-mkt-section>

<!-- Stats strip (self-contained dark background) -->
<os-stats-strip />

<!-- Feature highlights -->
<os-mkt-section background="alt">
  <os-feature-highlights />
</os-mkt-section>

<!-- How it works -->
<os-mkt-section>
  <os-how-it-works />
</os-mkt-section>

<!-- Final CTA (self-contained dark background) -->
<os-final-cta />
